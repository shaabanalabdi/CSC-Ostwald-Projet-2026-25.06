# ============================================================
# render.yaml — Render Blueprint for the CSC Ostwald backend.
#
# After connecting the GitHub repo on Render, the blueprint is detected
# automatically. Render provisions the service exactly as described here.
#
# Free tier note: the API instance sleeps after 15 min of inactivity.
# First request after a sleep takes ~30 s to wake the container. For a
# community-center site with low traffic this is acceptable; upgrade to
# a paid plan (Starter $7/mo) if cold starts become a problem.
# ============================================================

services:
  - type: web
    name: csc-ostwald-api
    runtime: node
    plan: free
    region: frankfurt # closest to Strasbourg / Alsace
    rootDir: api
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true # deploy on every push to the configured branch
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001 # Render maps this to the public port automatically

      # ── Frontend origin (CORS) ─────────────────────────────
      # MUST match the deployed Vercel URL exactly. Update this when
      # the domain is finalized (e.g. https://csc-ostwald.fr).
      - key: CORS_ORIGIN
        value: https://csc-ostwald.vercel.app

      # ── Database (Aiven / PlanetScale / Railway MySQL) ─────
      # Set these in the Render dashboard under "Environment".
      # NEVER commit real credentials.
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false

      # ── Auth ───────────────────────────────────────────────
      # Generate locally: `openssl rand -base64 64`
      # Then paste into Render dashboard → Environment → JWT_SECRET.
      - key: JWT_SECRET
        sync: false
      - key: JWT_TTL_SECONDS
        value: 86400
      - key: COOKIE_NAME
        value: jwt_token
      # SameSite — keep 'strict' when the frontend proxies /api/* through
      # Vercel rewrites (recommended). Switch to 'none' only if you host
      # the API on a distinct domain (e.g. api.csc-ostwald.fr).
      - key: COOKIE_SAMESITE
        value: strict

      # ── HelloAsso ────────────────────────────────────────────────
      # PAYMENTS_ENABLED is the master switch for the paid Jeunesse
      # registration feature. LAUNCH STATE = `false`: the site goes live
      # before the HelloAsso account exists, so /api/payment/* is not
      # mounted and the API boots without HelloAsso credentials.
      # When flipping to `true`: also set HELLOASSO_CLIENT_ID / _SECRET /
      # _WEBHOOK_SECRET below, and rebuild the Vercel frontend with
      # VITE_PAYMENTS_ENABLED=true. With PAYMENTS_ENABLED=true the API
      # refuses to boot unless HELLOASSO_MODE=real + all credentials set.
      - key: PAYMENTS_ENABLED
        value: false

      # Only consulted when PAYMENTS_ENABLED=true; harmless otherwise.
      - key: HELLOASSO_MODE
        value: real
      - key: HELLOASSO_BASE_URL
        value: https://api.helloasso.com
      - key: HELLOASSO_CLIENT_ID
        sync: false
      - key: HELLOASSO_CLIENT_SECRET
        sync: false
      - key: HELLOASSO_ORG_SLUG
        value: csc-ostwald
      - key: HELLOASSO_WEBHOOK_SECRET
        sync: false
      - key: HELLOASSO_RETURN_URL
        value: https://csc-ostwald.vercel.app/jeunesse/inscription-confirmee
      - key: HELLOASSO_CANCEL_URL
        value: https://csc-ostwald.vercel.app/jeunesse
