name: Deploy to GitHub Pages

# Construit le SPA Vite (dossier client/) et le publie sur GitHub Pages.
# Le site est servi sous /CSC-Ostwald-Projet-2026-25.06/ (page de projet),
# d'où VITE_BASE_PATH ci-dessous — dev et Vercel restent à la racine `/`.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions minimales requises par actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Une seule publication à la fois ; on annule un déploiement en cours
# si un nouveau push arrive.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    env:
      HUSKY: 0 # désactive l'install des hooks git en CI
      VITE_BASE_PATH: /CSC-Ostwald-Projet-2026-25.06/
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run build
      # Fallback SPA : GitHub Pages renvoie 404.html pour tout chemin
      # inconnu. En servant une copie d'index.html, React Router prend
      # le relais et affiche la bonne route (refresh / deep-link).
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          # Chemin relatif à la racine du dépôt (pas à working-directory).
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
