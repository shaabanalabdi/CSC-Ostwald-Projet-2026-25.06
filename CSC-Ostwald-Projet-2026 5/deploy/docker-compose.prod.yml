# =====================================================================
# docker-compose.prod.yml — Production stack on a single OVH VPS.
#
# Services:
#   - mysql       MySQL 8 with persistent volume + healthcheck.
#   - api         Node/Express built from Dockerfile.api.
#   - nginx       Reverse proxy + serves the React build over HTTPS.
#   - certbot     Renews the Let's Encrypt cert every 12 hours.
#
# All inter-service traffic stays on the internal `csc-net` Docker
# network. Only nginx publishes ports 80/443 to the host.
#
# Usage on the VPS (working dir = /srv/csc-ostwald):
#   docker compose -f docker-compose.prod.yml up -d
#
# Secrets come from a `.env` file in the same directory — see
# .env.example for the full list.
# =====================================================================

services:
  # ── MySQL 8 ──────────────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: csc-mysql
    restart: unless-stopped
    # Resource caps so a runaway MySQL query can't starve nginx/api on
    # the same VPS. Tune up if the table grows past ~100k rows.
    mem_limit: 1g
    cpus: '1.0'
    environment:
      # Root credentials kept ONLY for emergencies / backups (mysqldump
      # over `docker exec`). The Node API uses MYSQL_USER below, which
      # MySQL grants only ALL on ${DB_NAME}.* — no GRANT OPTION, no
      # superuser. Set a long, random DB_ROOT_PASSWORD (separate from
      # DB_PASSWORD) in your prod .env.
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      # Auto-created on first boot, scoped to the application database
      # only. The API reads these via DB_USER/DB_PASSWORD env vars.
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      # database.sql runs only on FIRST start (when the data dir is empty).
      # Reseed by deleting the mysql-data volume.
      - ../api/database.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - csc-net
    healthcheck:
      # `ping` only needs to know the server is up — no SELECT, so the
      # least-privileged app user works fine here and we avoid leaking the
      # root password into the healthcheck process argv (visible in
      # `docker inspect`).
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u${DB_USER}', '-p${DB_PASSWORD}']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Node API ─────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    container_name: csc-api
    restart: unless-stopped
    # Caps protect the host from a Node memory leak. Bump if the API starts
    # OOM-killing under real load — but leak first.
    mem_limit: 512m
    cpus: '1.0'
    env_file:
      - .env
    environment:
      # Inside the container, MySQL is reachable as "mysql" (the service
      # name on the Docker network), NOT localhost.
      DB_HOST: mysql
      DB_PORT: '3306'
      NODE_ENV: production
    volumes:
      # Persist uploaded images across container rebuilds. multer writes
      # here, Express serves from here.
      - api-uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - csc-net

  # ── Nginx reverse proxy + static React app ───────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: csc-nginx
    restart: unless-stopped
    mem_limit: 256m
    cpus: '0.5'
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # React production build — rsynced here by deploy.sh.
      - ./client-build:/usr/share/nginx/html:ro
      # Let's Encrypt cert + webroot for ACME HTTP-01 challenge.
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - api
    networks:
      - csc-net

  # ── Certbot — renews the SSL cert ────────────────────────────────
  # Re-runs every 12h. The renew command is a no-op if the cert is
  # still valid for > 30 days, so this is safe to run continuously.
  certbot:
    image: certbot/certbot:latest
    container_name: csc-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint:
      - /bin/sh
      - -c
      - |
        trap exit TERM
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet
          sleep 12h
        done

volumes:
  mysql-data:
    name: csc_mysql_data
  api-uploads:
    name: csc_api_uploads

networks:
  csc-net:
    name: csc-net
    driver: bridge
